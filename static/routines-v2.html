<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0f">
  <title>Routines v2 - Life Manager</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="stylesheet" href="/static/css/routines-v2.css">
</head>
<body>
  <main class="v2-shell">
    <div class="v2-top">
      <div>
        <h1>Routines</h1>
        <p>Ground-up v2. Own data. Own completions. No old scheduler.</p>
      </div>
      <div class="v2-actions">
        <button class="v2-btn primary" id="addBtn" type="button">+ Add</button>
        <button class="v2-btn" id="exportBtn" type="button">Export</button>
        <a class="v2-pill" href="/cards">Old</a>
      </div>
    </div>

    <section class="v2-form card" id="formWrap">
      <h2 id="formTitle">Add routine</h2>
      <div class="v2-form-grid">
        <label>Name<input id="nameInput" autocomplete="off" placeholder="Freeze milk"></label>
        <label>Area<input id="areaInput" autocomplete="off" placeholder="Home"></label>
        <label>Repeat<select id="typeInput"><option value="daily">Daily</option><option value="times_per_day">Times per day</option><option value="every_n_days">Every N days</option><option value="times_per_week">Times per week</option><option value="weekdays">Specific weekdays</option><option value="every_n_months">Every N months</option></select></label>
        <label id="valueLabel">Value<input id="valueInput" type="number" min="1" step="1" value="1"></label>
        <label id="daysLabel">Weekdays<input id="daysInput" placeholder="Tue, Thu or 1,3"></label>
        <label>Notes<textarea id="notesInput" rows="2"></textarea></label>
      </div>
      <input id="editId" type="hidden">
      <div class="v2-form-actions">
        <button class="v2-btn" id="cancelBtn" type="button">Cancel</button>
        <button class="v2-btn" id="deleteBtn" type="button">Delete</button>
        <button class="v2-btn primary" id="saveBtn" type="button">Save</button>
      </div>
    </section>

    <div id="message"></div>
    <div id="app" class="v2-grid"></div>
  </main>

  <nav class="v2-bottom"><a href="/">Home</a><a class="active" href="/static/routines-v2.html">Routines</a><a href="/baby">Baby</a><a href="/cleaning">Cleaning</a><a href="/budget">Budget</a><a href="/recipes">Recipes</a></nav>
  <script src="/static/js/routines-v2.js"></script>
</body>
</html>
