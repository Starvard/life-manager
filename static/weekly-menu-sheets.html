<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Weekly Menu Sheets</title>
<style>
:root{--paper:#fbf6ea;--ink:#203126;--muted:#73766d;--gold:#b99a5f;--green:#284735;--line:#d9c6a5}*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#efe4d1,#fbf6ea);color:var(--ink);font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif}.wrap{max-width:1180px;margin:0 auto;padding:18px 12px 60px}.bar{display:flex;justify-content:space-between;gap:12px;align-items:center;position:sticky;top:8px;z-index:5;background:rgba(255,250,240,.9);border:1px solid rgba(185,154,95,.4);border-radius:22px;padding:14px;box-shadow:0 12px 30px rgba(40,71,53,.12);backdrop-filter:blur(12px)}.brand b{display:block;font-family:Georgia,serif;font-size:1.35rem;color:var(--green)}.brand span{font-size:.82rem;color:var(--muted)}.controls{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end}.pill{border:1px solid rgba(185,154,95,.45);border-radius:999px;background:#fffaf0;padding:8px 10px;font-weight:750;color:var(--green)}input{border:0;background:transparent;color:var(--green);font-weight:750}button{border:1px solid rgba(185,154,95,.45);border-radius:999px;background:var(--green);color:#fffaf0;padding:9px 13px;font-weight:850}.ghost{background:#fffaf0;color:var(--green)}.hint{color:var(--muted);font-size:.9rem}.pages{display:grid;grid-template-columns:repeat(auto-fit,minmax(315px,1fr));gap:18px}.page{min-height:760px;background:linear-gradient(180deg,rgba(255,255,255,.55),rgba(255,250,240,.92)),var(--paper);border:1px solid rgba(185,154,95,.45);border-radius:28px;padding:30px;box-shadow:0 18px 42px rgba(35,31,24,.14);position:relative;overflow:hidden}.page:before{content:"";position:absolute;inset:12px;border:1px solid rgba(185,154,95,.28);border-radius:22px;pointer-events:none}.inner{position:relative;z-index:1}.eyebrow{color:var(--gold);font-size:.72rem;font-weight:950;text-transform:uppercase;letter-spacing:.16em;margin-bottom:10px}.day{font-family:Georgia,serif;font-size:3rem;line-height:.92;letter-spacing:-.055em;color:var(--green);margin:0}.date{color:var(--muted);margin:10px 0 18px}.rule{height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:18px 0 22px}.meal{margin-bottom:22px}.label{color:var(--gold);font-size:.72rem;font-weight:950;text-transform:uppercase;letter-spacing:.12em;margin-bottom:5px}.title{font-family:Georgia,serif;font-size:1.38rem;line-height:1.08;margin:0 0 4px}.detail{color:var(--muted);line-height:1.35}.note{margin-top:26px;padding-top:14px;border-top:1px solid rgba(185,154,95,.35);color:var(--muted);font-size:.82rem;font-style:italic}.snackbox{margin-top:22px;background:rgba(255,250,240,.86);border:1px solid rgba(185,154,95,.4);border-radius:24px;padding:20px}.snackbox h2{font-family:Georgia,serif;color:var(--green);margin:0 0 10px}.snacks{display:flex;flex-wrap:wrap;gap:8px}.snack{border:1px solid rgba(185,154,95,.45);border-radius:999px;padding:8px 12px;background:rgba(255,255,255,.58);font-weight:800;color:var(--green)}[contenteditable=true]:focus{outline:0;background:rgba(185,154,95,.13);border-radius:7px;box-shadow:0 0 0 4px rgba(185,154,95,.12)}@media(max-width:720px){.bar{position:static;align-items:flex-start;flex-direction:column}.controls{justify-content:flex-start}.page{min-height:auto;padding:24px}.day{font-size:2.55rem}}@media print{@page{size:letter;margin:.35in}body{background:#fff}.wrap{max-width:none;padding:0}.bar,.hint,.snackbox{display:none}.pages{display:block}.page{box-shadow:none;border-radius:0;min-height:9.8in;padding:.52in;page-break-after:always;break-after:page}.page:last-child{page-break-after:auto;break-after:auto}.day{font-size:3.2rem}}
</style>
</head>
<body>
<div class="wrap">
<header class="bar"><div class="brand"><b>Weekly Menu Sheets</b><span>Editable phone view + seven-page print menu</span></div><div class="controls"><label class="pill">Week starts <input id="start" type="date" value="2026-05-11"></label><button class="ghost" id="load">Load week</button><button class="ghost" id="reset">Reset</button><button id="print">Print</button></div></header>
<p class="hint">Tap any menu text to edit it. Changes save automatically for the selected Monday start date on this device.</p>
<main id="pages" class="pages"></main>
<section class="snackbox"><h2>Trip Snack Pool</h2><div id="snacks" class="snacks"></div></section>
</div>
<script>
const KEY='life-manager.weekly-menu-sheets.';
const snacks=['Cheese & cucumber box','Apple cheddar bites','Turkey roll-ups','Greek yogurt cups','Cottage cheese cups','Peanut butter yogurt dip','Celery & peanut butter','Edamame with lime','Brie with apple','Hard-boiled eggs'];
const starter={subtitle:'Balanced, simple, family-friendly',days:[
['Monday','First lunch is fresh, not leftovers.',[['Breakfast','Egg Bites','Berries, greens, cheddar'],['Snack','Cottage Cheese','Cucumber, cracked pepper, lemon'],['Lunch','Turkey Lettuce Cups','Avocado, pico, pickled onion, lime'],['Snack','Apple & Brie','Whole-grain crackers'],['Dinner','Turkey Burgers','Butter lettuce, cheddar, tomato, chipotle yogurt sauce · zucchini & peppers']]],
['Tuesday','Keep the fried rice mostly cauliflower rice with enough real rice to feel right.',[['Breakfast','Greek Yogurt Bowl','Berries, chia, toasted nuts'],['Snack','Hard-Boiled Eggs','Kosher salt, cracked pepper'],['Lunch','Turkey Burger Salad','Greens, avocado, cucumber, tomato'],['Snack','Celery & Peanut Butter','Cinnamon'],['Dinner','Chicken Fried Rice','Chicken, egg, cauliflower rice, garlic, broccoli, lime']]],
['Wednesday','Vacation day. Keep snacks easy and meals flexible.',[['Breakfast','Eat Out','Hilton Head'],['Snack','Cheese & Cucumber Box','Pickles, crackers'],['Lunch','Eat Out','Hilton Head'],['Snack','Greek Yogurt Cup','Berries, chia'],['Dinner','Eat Out','Hilton Head']]],
['Thursday','Simple protein-forward snacks for the beach bag.',[['Breakfast','Eat Out','Hilton Head'],['Snack','Apple Cheddar Bites','Almonds or crackers'],['Lunch','Eat Out','Hilton Head'],['Snack','Turkey Roll-Ups','Cheese, pickle, cucumber'],['Dinner','Eat Out','Hilton Head']]],
['Friday','Flexible travel-home dinner.',[['Breakfast','Eat Out','Hilton Head'],['Snack','Cottage Cheese Cup','Tomato, cucumber, everything seasoning'],['Lunch','Eat Out','Hilton Head'],['Snack','Peanut Butter Yogurt Dip','Apple slices'],['Dinner','Eat Out or Easy Home Plate','Chicken, greens, avocado, cucumber']]],
['Saturday','Back home, still easy.',[['Breakfast','Protein Waffles','Greek yogurt, berries, peanut butter'],['Snack','Edamame','Lime, sea salt'],['Lunch','Shrimp Taco Salad','Cabbage, pico, avocado, chipotle lime crema'],['Snack','Frozen Yogurt Berry Bark','Chia, toasted nuts'],['Dinner','Chuck Roast Bowls','Greens, cauliflower rice, pico, avocado, sour cream']]],
['Sunday','A simple Sunday finish.',[['Breakfast','Brunch Plate','Eggs, berries, avocado, microgreens'],['Snack','Cucumber Brie Bites','Lemon, cracked pepper'],['Lunch','Chicken Salad Lettuce Cups','Celery, Greek yogurt, herbs, apple'],['Snack','Cheese & Crackers','Pickles, cucumber'],['Dinner','Lemon Garlic Shrimp','Zucchini, red pepper, basil, broccoli']]]],snacks};
function k(){return KEY+document.getElementById('start').value}function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}function fmt(d){return new Date(d+'T00:00:00').toLocaleDateString(undefined,{month:'long',day:'numeric',year:'numeric'})}function fresh(){const m=JSON.parse(JSON.stringify(starter));const s=new Date(document.getElementById('start').value+'T00:00:00');m.days=m.days.map((d,i)=>{const n=new Date(s);n.setDate(s.getDate()+i);return{day:d[0],note:d[1],meals:d[2],date:n.toISOString().slice(0,10)}});return m}function menu(){try{return JSON.parse(localStorage.getItem(k()))||fresh()}catch(e){return fresh()}}function save(m){localStorage.setItem(k(),JSON.stringify(m))}
function render(){const m=menu();const pages=document.getElementById('pages');pages.innerHTML='';m.days.forEach((d,di)=>{const p=document.createElement('article');p.className='page';p.innerHTML=`<div class="inner"><div class="eyebrow" contenteditable="true" data-sub="1">${esc(m.subtitle)}</div><h1 class="day" contenteditable="true" data-day="${di}" data-field="day">${esc(d.day)}</h1><div class="date">${fmt(d.date)}</div><div class="rule"></div><div class="meal-list"></div><div class="note" contenteditable="true" data-day="${di}" data-field="note">${esc(d.note)}</div></div>`;const list=p.querySelector('.meal-list');d.meals.forEach((meal,mi)=>{const b=document.createElement('section');b.className='meal';b.innerHTML=`<div class="label" contenteditable="true" data-day="${di}" data-meal="${mi}" data-i="0">${esc(meal[0])}</div><h2 class="title" contenteditable="true" data-day="${di}" data-meal="${mi}" data-i="1">${esc(meal[1])}</h2><div class="detail" contenteditable="true" data-day="${di}" data-meal="${mi}" data-i="2">${esc(meal[2])}</div>`;list.appendChild(b)});pages.appendChild(p)});const sw=document.getElementById('snacks');sw.innerHTML='';(m.snacks||snacks).forEach((s,i)=>{const c=document.createElement('span');c.className='snack';c.contentEditable='true';c.dataset.snack=i;c.textContent=s;sw.appendChild(c)});document.querySelectorAll('[contenteditable=true]').forEach(el=>el.addEventListener('input',()=>{const d=el.dataset;if(d.sub)m.subtitle=el.innerText;if(d.day&&d.field)m.days[+d.day][d.field]=el.innerText;if(d.day&&d.meal&&d.i)m.days[+d.day].meals[+d.meal][+d.i]=el.innerText;if(d.snack)m.snacks[+d.snack]=el.innerText;save(m)}))}
document.getElementById('print').onclick=()=>window.print();document.getElementById('load').onclick=render;document.getElementById('start').onchange=render;document.getElementById('reset').onclick=()=>{if(confirm('Reset this week?')){localStorage.removeItem(k());render()}};render();
</script>
</body>
</html>
