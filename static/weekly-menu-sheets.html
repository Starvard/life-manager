<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mother’s Day Menu</title>
<style>
:root{--paper:#fffaf0;--ink:#1f2f27;--muted:#686d64;--gold:#b79a61;--green:#243f31;--line:#dcc9a8;--wash:#f2e7d4}*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#eadfca,#fffaf0);color:var(--ink);font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif}.wrap{max-width:1160px;margin:0 auto;padding:18px 12px 60px}.bar{display:flex;justify-content:space-between;gap:12px;align-items:center;position:sticky;top:8px;z-index:5;background:rgba(255,250,240,.92);border:1px solid rgba(183,154,97,.34);border-radius:22px;padding:12px 14px;box-shadow:0 12px 30px rgba(36,63,49,.10);backdrop-filter:blur(12px)}.brand b{display:block;font-family:Georgia,serif;font-size:1.35rem;color:var(--green);letter-spacing:-.02em}.brand span{font-size:.8rem;color:var(--muted)}.controls{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end}.pill{border:1px solid rgba(183,154,97,.42);border-radius:999px;background:#fffaf0;padding:8px 10px;font-weight:750;color:var(--green)}input{border:0;background:transparent;color:var(--green);font-weight:750}button{border:1px solid rgba(183,154,97,.45);border-radius:999px;background:var(--green);color:#fffaf0;padding:9px 13px;font-weight:850}.ghost{background:#fffaf0;color:var(--green)}.hint{color:var(--muted);font-size:.84rem;margin:12px 2px 18px}.pages{display:grid;grid-template-columns:repeat(auto-fit,minmax(315px,1fr));gap:18px}.page{min-height:760px;background:linear-gradient(180deg,rgba(255,255,255,.72),rgba(255,250,240,.96)),var(--paper);border:1px solid rgba(183,154,97,.46);border-radius:30px;padding:34px 32px;box-shadow:0 18px 42px rgba(35,31,24,.13);position:relative;overflow:hidden}.page:before{content:"";position:absolute;inset:13px;border:1px solid rgba(183,154,97,.26);border-radius:24px;pointer-events:none}.page:after{content:"";position:absolute;width:84px;height:84px;right:-36px;top:-36px;border-radius:999px;border:1px solid rgba(183,154,97,.28);background:rgba(183,154,97,.05)}.inner{position:relative;z-index:1;min-height:690px;display:flex;flex-direction:column}.eyebrow{color:var(--gold);font-size:.68rem;font-weight:900;text-transform:uppercase;letter-spacing:.18em;margin-bottom:12px;text-align:center}.day{font-family:Georgia,serif;font-size:3.15rem;line-height:.92;letter-spacing:-.055em;color:var(--green);margin:0;text-align:center}.rule{width:76%;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:22px auto 26px}.meal{margin-bottom:22px;text-align:center}.label{color:var(--gold);font-size:.68rem;font-weight:900;text-transform:uppercase;letter-spacing:.14em;margin-bottom:6px}.title{font-family:Georgia,serif;font-size:1.42rem;line-height:1.08;margin:0 0 5px;font-weight:500}.detail{color:var(--muted);line-height:1.35;font-size:.96rem}.note{margin-top:auto;padding-top:18px;border-top:1px solid rgba(183,154,97,.28);color:var(--muted);font-size:.78rem;font-style:italic;text-align:center}.note:empty{display:none}.snackbox{margin-top:22px;background:rgba(255,250,240,.88);border:1px solid rgba(183,154,97,.38);border-radius:24px;padding:20px}.snackbox h2{font-family:Georgia,serif;color:var(--green);margin:0 0 10px;font-weight:500}.snacks{display:flex;flex-wrap:wrap;gap:8px}.snack{border:1px solid rgba(183,154,97,.42);border-radius:999px;padding:8px 12px;background:rgba(255,255,255,.60);font-weight:750;color:var(--green)}[contenteditable=true]:focus{outline:0;background:rgba(183,154,97,.13);border-radius:7px;box-shadow:0 0 0 4px rgba(183,154,97,.12)}@media(max-width:720px){.bar{position:static;align-items:flex-start;flex-direction:column}.controls{justify-content:flex-start}.page{min-height:auto;padding:28px 24px}.inner{min-height:auto}.day{font-size:2.65rem}.meal{text-align:left}.eyebrow,.day{text-align:left}.rule{width:100%;margin-left:0}.note{text-align:left}}@media print{@page{size:letter;margin:.35in}body{background:#fff}.wrap{max-width:none;padding:0}.bar,.hint,.snackbox{display:none}.pages{display:block}.page{box-shadow:none;border-radius:0;min-height:9.8in;padding:.62in;page-break-after:always;break-after:page}.page:last-child{page-break-after:auto;break-after:auto}.inner{min-height:8.55in}.day{font-size:3.35rem}.meal{margin-bottom:.27in}.title{font-size:1.48rem}.detail{font-size:.98rem}.note{font-size:.78rem}}
</style>
</head>
<body>
<div class="wrap">
<header class="bar"><div class="brand"><b>Mother’s Day Menu</b><span>Edit · Review · Print</span></div><div class="controls"><label class="pill">Week starts <input id="start" type="date" value="2026-05-11"></label><button class="ghost" id="load">Load</button><button class="ghost" id="reset">Reset</button><button id="print">Print</button></div></header>
<p class="hint">Tap menu text to edit. Print view is seven clean menu pages.</p>
<main id="pages" class="pages"></main>
<section class="snackbox"><h2>Snack List</h2><div id="snacks" class="snacks"></div></section>
</div>
<script>
const VERSION='michelin-clean-v1';
const KEY='life-manager.weekly-menu-sheets.';
const VERSION_KEY='life-manager.weekly-menu-sheets.version.';
const snacks=['Cheese & cucumber box','Apple cheddar bites','Turkey roll-ups','Greek yogurt cups','Cottage cheese cups','Peanut butter yogurt dip','Celery & peanut butter','Edamame with lime','Brie with apple','Hard-boiled eggs'];
const starter={subtitle:'Mother’s Day Week',days:[
['Monday','',[['Breakfast','Egg Bites','Berries, greens, cheddar'],['Snack','Cottage Cheese','Cucumber, cracked pepper, lemon'],['Lunch','Turkey Lettuce Cups','Avocado, pico, pickled onion, lime'],['Snack','Apple & Brie','Whole-grain crackers'],['Dinner','Turkey Burgers','Butter lettuce, cheddar, tomato, chipotle yogurt sauce · zucchini & peppers']]],
['Tuesday','',[['Breakfast','Greek Yogurt Bowl','Berries, chia, toasted nuts'],['Snack','Hard-Boiled Eggs','Kosher salt, cracked pepper'],['Lunch','Turkey Burger Salad','Greens, avocado, cucumber, tomato'],['Snack','Celery & Peanut Butter','Cinnamon'],['Dinner','Chicken Fried Rice','Chicken, egg, cauliflower rice, garlic, broccoli, lime']]],
['Wednesday','Hilton Head',[['Breakfast','Eat Out','Hilton Head'],['Snack','Cheese & Cucumber Box','Pickles, crackers'],['Lunch','Eat Out','Hilton Head'],['Snack','Greek Yogurt Cup','Berries, chia'],['Dinner','Eat Out','Hilton Head']]],
['Thursday','Hilton Head',[['Breakfast','Eat Out','Hilton Head'],['Snack','Apple Cheddar Bites','Almonds or crackers'],['Lunch','Eat Out','Hilton Head'],['Snack','Turkey Roll-Ups','Cheese, pickle, cucumber'],['Dinner','Eat Out','Hilton Head']]],
['Friday','Hilton Head',[['Breakfast','Eat Out','Hilton Head'],['Snack','Cottage Cheese Cup','Tomato, cucumber, everything seasoning'],['Lunch','Eat Out','Hilton Head'],['Snack','Peanut Butter Yogurt Dip','Apple slices'],['Dinner','Eat Out or Easy Home Plate','Chicken, greens, avocado, cucumber']]],
['Saturday','',[['Breakfast','Protein Waffles','Greek yogurt, berries, peanut butter'],['Snack','Edamame','Lime, sea salt'],['Lunch','Shrimp Taco Salad','Cabbage, pico, avocado, chipotle lime crema'],['Snack','Frozen Yogurt Berry Bark','Chia, toasted nuts'],['Dinner','Chuck Roast Bowls','Greens, cauliflower rice, pico, avocado, sour cream']]],
['Sunday','',[['Breakfast','Brunch Plate','Eggs, berries, avocado, microgreens'],['Snack','Cucumber Brie Bites','Lemon, cracked pepper'],['Lunch','Chicken Salad Lettuce Cups','Celery, Greek yogurt, herbs, apple'],['Snack','Cheese & Crackers','Pickles, cucumber'],['Dinner','Lemon Garlic Shrimp','Zucchini, red pepper, basil, broccoli']]]],snacks};
function k(){return KEY+document.getElementById('start').value}function vk(){return VERSION_KEY+document.getElementById('start').value}function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}function fresh(){const m=JSON.parse(JSON.stringify(starter));const s=new Date(document.getElementById('start').value+'T00:00:00');m.days=m.days.map((d,i)=>{const n=new Date(s);n.setDate(s.getDate()+i);return{day:d[0],note:d[1],meals:d[2],date:n.toISOString().slice(0,10)}});return m}function cleanSaved(m){if(!m||!Array.isArray(m.days))return fresh();m.subtitle='Mother’s Day Week';const oldNotes=['First lunch is fresh, not leftovers.','Keep the fried rice mostly cauliflower rice with enough real rice to feel right.','Vacation day. Keep snacks easy and meals flexible.','Simple protein-forward snacks for the beach bag.','Flexible travel-home dinner.','Back home, still easy.','A simple Sunday finish.'];m.days.forEach(d=>{if(oldNotes.includes(d.note))d.note=(['Wednesday','Thursday','Friday'].includes(d.day)?'Hilton Head':'')});return m}function menu(){try{let m=JSON.parse(localStorage.getItem(k()))||fresh();if(localStorage.getItem(vk())!==VERSION){m=cleanSaved(m);localStorage.setItem(k(),JSON.stringify(m));localStorage.setItem(vk(),VERSION)}return m}catch(e){return fresh()}}function save(m){localStorage.setItem(k(),JSON.stringify(m));localStorage.setItem(vk(),VERSION)}
function render(){const m=menu();const pages=document.getElementById('pages');pages.innerHTML='';m.days.forEach((d,di)=>{const p=document.createElement('article');p.className='page';p.innerHTML=`<div class="inner"><div class="eyebrow" contenteditable="true" data-sub="1">${esc(m.subtitle)}</div><h1 class="day" contenteditable="true" data-day="${di}" data-field="day">${esc(d.day)}</h1><div class="rule"></div><div class="meal-list"></div><div class="note" contenteditable="true" data-day="${di}" data-field="note">${esc(d.note||'')}</div></div>`;const list=p.querySelector('.meal-list');d.meals.forEach((meal,mi)=>{const b=document.createElement('section');b.className='meal';b.innerHTML=`<div class="label" contenteditable="true" data-day="${di}" data-meal="${mi}" data-i="0">${esc(meal[0])}</div><h2 class="title" contenteditable="true" data-day="${di}" data-meal="${mi}" data-i="1">${esc(meal[1])}</h2><div class="detail" contenteditable="true" data-day="${di}" data-meal="${mi}" data-i="2">${esc(meal[2])}</div>`;list.appendChild(b)});pages.appendChild(p)});const sw=document.getElementById('snacks');sw.innerHTML='';(m.snacks||snacks).forEach((s,i)=>{const c=document.createElement('span');c.className='snack';c.contentEditable='true';c.dataset.snack=i;c.textContent=s;sw.appendChild(c)});document.querySelectorAll('[contenteditable=true]').forEach(el=>el.addEventListener('input',()=>{const d=el.dataset;if(d.sub)m.subtitle=el.innerText;if(d.day&&d.field)m.days[+d.day][d.field]=el.innerText;if(d.day&&d.meal&&d.i)m.days[+d.day].meals[+d.meal][+d.i]=el.innerText;if(d.snack)m.snacks[+d.snack]=el.innerText;save(m)}))}
document.getElementById('print').onclick=()=>window.print();document.getElementById('load').onclick=render;document.getElementById('start').onchange=render;document.getElementById('reset').onclick=()=>{if(confirm('Reset this menu?')){localStorage.removeItem(k());localStorage.removeItem(vk());render()}};render();
</script>
</body>
</html>
