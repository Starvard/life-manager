<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>May 18 Menu Cards</title>
<style>
:root{--paper:#fffaf0;--ink:#203529;--muted:#687067;--gold:#b79a61;--green:#243f31}*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#eadfca,#fffaf0);color:var(--ink);font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif}.wrap{max-width:1160px;margin:0 auto;padding:18px 12px 60px}.bar{display:flex;justify-content:space-between;gap:12px;align-items:center;position:sticky;top:8px;z-index:5;background:rgba(255,250,240,.94);border:1px solid rgba(183,154,97,.34);border-radius:22px;padding:12px 14px;box-shadow:0 12px 30px rgba(36,63,49,.10);backdrop-filter:blur(12px)}.brand b{display:block;font-family:Georgia,serif;font-size:1.35rem;color:var(--green);letter-spacing:-.02em}.brand span{font-size:.8rem;color:var(--muted)}button{border:1px solid rgba(183,154,97,.45);border-radius:999px;background:var(--green);color:#fffaf0;padding:9px 13px;font-weight:850}.hint{color:var(--muted);font-size:.84rem;margin:12px 2px 18px}.pages{display:grid;grid-template-columns:repeat(auto-fit,minmax(315px,1fr));gap:18px}.page{min-height:760px;background:linear-gradient(180deg,rgba(255,255,255,.72),rgba(255,250,240,.96)),var(--paper);border:1px solid rgba(183,154,97,.46);border-radius:30px;padding:34px 32px;box-shadow:0 18px 42px rgba(35,31,24,.13);position:relative;overflow:hidden}.page:before{content:"";position:absolute;inset:13px;border:1px solid rgba(183,154,97,.26);border-radius:24px;pointer-events:none}.inner{position:relative;z-index:1;min-height:690px;display:flex;flex-direction:column}.eyebrow{color:var(--gold);font-size:.68rem;font-weight:900;text-transform:uppercase;letter-spacing:.18em;margin-bottom:12px;text-align:center}.day{font-family:Georgia,serif;font-size:3.05rem;line-height:.92;letter-spacing:-.055em;color:var(--green);margin:0;text-align:center}.date{margin-top:8px;text-align:center;color:var(--muted);font-size:.86rem}.rule{width:76%;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:22px auto 26px}.meal{margin-bottom:20px;text-align:center}.label{color:var(--gold);font-size:.68rem;font-weight:900;text-transform:uppercase;letter-spacing:.14em;margin-bottom:6px}.title{font-family:Georgia,serif;font-size:1.36rem;line-height:1.08;margin:0 0 5px;font-weight:500}.detail{color:var(--muted);line-height:1.35;font-size:.95rem}.note{margin-top:auto;padding-top:18px;border-top:1px solid rgba(183,154,97,.28);color:var(--muted);font-size:.78rem;font-style:italic;text-align:center}.box{margin-top:22px;background:rgba(255,250,240,.88);border:1px solid rgba(183,154,97,.38);border-radius:24px;padding:20px}.box h2{font-family:Georgia,serif;color:var(--green);margin:0 0 10px;font-weight:500}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{border:1px solid rgba(183,154,97,.42);border-radius:999px;padding:8px 12px;background:rgba(255,255,255,.60);font-weight:750;color:var(--green)}[contenteditable=true]:focus{outline:0;background:rgba(183,154,97,.13);border-radius:7px;box-shadow:0 0 0 4px rgba(183,154,97,.12)}@media(max-width:720px){.bar{position:static;align-items:flex-start;flex-direction:column}.page{min-height:auto;padding:28px 24px}.inner{min-height:auto}.day{font-size:2.55rem}.meal{text-align:left}.eyebrow,.day,.date{text-align:left}.rule{width:100%;margin-left:0}.note{text-align:left}}@media print{@page{size:letter;margin:.35in}body{background:#fff}.wrap{max-width:none;padding:0}.bar,.hint,.box{display:none}.pages{display:block}.page{box-shadow:none;border-radius:0;min-height:9.8in;padding:.62in;page-break-after:always;break-after:page}.page:last-child{page-break-after:auto;break-after:auto}.inner{min-height:8.55in}.day{font-size:3.2rem}.meal{margin-bottom:.24in}.title{font-size:1.42rem}.detail{font-size:.96rem}.note{font-size:.78rem}}
</style>
</head>
<body>
<div class="wrap">
<header class="bar"><div class="brand"><b>May 18 Menu Cards</b><span>Final approved menu · Print ready</span></div><button id="print">Print Cards</button></header>
<p class="hint">These cards reflect the final menu after grocery ordering. Tap text to edit before printing.</p>
<main id="pages" class="pages"></main>
<section class="box"><h2>Snack Menu</h2><div id="snacks" class="chips"></div></section>
</div>
<script>
const VERSION='may18-final-print-cards-v1';
const KEY='life-manager.weekly-menu-sheets.2026-05-18';
const VERSION_KEY='life-manager.weekly-menu-sheets.version.2026-05-18';
const snacks=['Hard-boiled eggs','Cottage cheese with cucumber','Greek yogurt with berries and chia','Apple with cheddar','Turkey and cheese roll-ups','Celery with peanut butter','Edamame with lime','Hummus cucumber bites','Caprese cucumber bites','Deviled egg cups with Greek yogurt','Smoked turkey pickle roll-ups','Ricotta cocoa bowl with walnuts','Roasted chickpea crunch','Mini tuna cucumber boats'];
const starter={subtitle:'Week of May 18 · Final Menu',days:[
['Monday','May 18',[['Breakfast','Greek Yogurt Blueberry Bowl','Blueberries, chia, toasted walnuts, cinnamon'],['Lunch','Leftover Beef Chuck Bowls','Tender chuck, greens, avocado, lime crema'],['Dinner','Lemon Garlic Shrimp & Chicken Bowls','Broccoli, zucchini, cauliflower rice, garlic, lemon']], 'Dinner carries into Tuesday lunch.'],
['Tuesday','May 19',[['Breakfast','Garden Egg Scramble','Greens, tomato, avocado'],['Lunch','Shrimp-Chicken Vegetable Bowls','Leftover shrimp and chicken over crisp greens'],['Dinner','Turkey Taco Lettuce Bowls','Avocado, lime crema, black beans']], 'Dinner carries into Wednesday lunch.'],
['Wednesday','May 20',[['Breakfast','Tomato & Greens Egg Bites','Soft egg bites with greens and cheese'],['Lunch','Turkey Taco Salad','Leftover turkey taco over greens'],['Dinner','Bunless Burger Salad','Pickles, tomato, avocado, yogurt burger sauce']], 'Dinner carries into Thursday lunch.'],
['Thursday','May 21',[['Breakfast','Egg Bites with Berries','Leftover egg bites, fresh berries'],['Lunch','Burger Lettuce Cups','Cucumber, pickles, yogurt burger sauce'],['Dinner','Chicken Fajita Cauliflower Bowls','Peppers, onions, salsa, avocado']], 'Dinner carries into Friday lunch.'],
['Friday','May 22',[['Breakfast','Cottage Cheese Berry Bowl','Berries, chia, walnuts'],['Lunch','Fajita Chicken Salad','Avocado, cucumber, salsa'],['Dinner','Sesame Beef & Broccoli Bowls','Ginger, scallion, cauliflower rice']], 'Dinner carries into Saturday lunch.'],
['Saturday','May 23',[['Breakfast','Protein Pancakes','Greek yogurt, berries, walnuts'],['Lunch','Sesame Beef Broccoli Bowls','Cucumber salad, cauliflower rice'],['Dinner','Greek Turkey Meatball Bowls','Cucumber tomato salad, cauliflower rice, yogurt herb sauce']], 'Dinner carries into Sunday lunch.'],
['Sunday','May 24',[['Breakfast','Veggie Omelet','Greens, tomato, avocado'],['Lunch','Turkey Meatball Salad Bowls','Leftover meatballs, greens, cucumber tomato salad'],['Dinner','Lemon Roasted Salmon or Chicken','Broccoli, zucchini, olive oil, lemon']], 'Simple reset dinner.']
]};
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function fresh(){return JSON.parse(JSON.stringify(starter))}
function menu(){try{let m=JSON.parse(localStorage.getItem(KEY))||fresh();if(localStorage.getItem(VERSION_KEY)!==VERSION){m=fresh();localStorage.setItem(KEY,JSON.stringify(m));localStorage.setItem(VERSION_KEY,VERSION)}return m}catch(e){return fresh()}}
function save(m){localStorage.setItem(KEY,JSON.stringify(m));localStorage.setItem(VERSION_KEY,VERSION)}
function render(){const m=menu();const pages=document.getElementById('pages');pages.innerHTML='';m.days.forEach((d,di)=>{const p=document.createElement('article');p.className='page';p.innerHTML=`<div class="inner"><div class="eyebrow" contenteditable="true" data-sub="1">${esc(m.subtitle)}</div><h1 class="day" contenteditable="true" data-day="${di}" data-field="day">${esc(d[0])}</h1><div class="date" contenteditable="true" data-day="${di}" data-field="date">${esc(d[1])}</div><div class="rule"></div><div class="meal-list"></div><div class="note" contenteditable="true" data-day="${di}" data-field="note">${esc(d[3]||'')}</div></div>`;const list=p.querySelector('.meal-list');d[2].forEach((meal,mi)=>{const b=document.createElement('section');b.className='meal';b.innerHTML=`<div class="label" contenteditable="true" data-day="${di}" data-meal="${mi}" data-i="0">${esc(meal[0])}</div><h2 class="title" contenteditable="true" data-day="${di}" data-meal="${mi}" data-i="1">${esc(meal[1])}</h2><div class="detail" contenteditable="true" data-day="${di}" data-meal="${mi}" data-i="2">${esc(meal[2])}</div>`;list.appendChild(b)});pages.appendChild(p)});document.getElementById('snacks').innerHTML=snacks.map(x=>`<span class="chip">${esc(x)}</span>`).join('');document.querySelectorAll('[contenteditable=true]').forEach(el=>el.addEventListener('input',()=>{const d=el.dataset;if(d.sub)m.subtitle=el.innerText;if(d.day&&d.field==='day')m.days[+d.day][0]=el.innerText;if(d.day&&d.field==='date')m.days[+d.day][1]=el.innerText;if(d.day&&d.field==='note')m.days[+d.day][3]=el.innerText;if(d.day&&d.meal&&d.i)m.days[+d.day][2][+d.meal][+d.i]=el.innerText;save(m)}))}
document.getElementById('print').onclick=()=>window.print();render();
</script>
</body>
</html>
