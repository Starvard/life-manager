<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a0f">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <title>{% block title %}Life Manager{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v={{ cache_bust }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-brand">Life Manager</div>
            <nav>
                <a href="{{ url_for('dashboard') }}" data-nav-tab="home" class="{% if request.endpoint == 'dashboard' %}active{% endif %}{% if 'home' in hidden_nav_tabs %} nav-link-hidden{% endif %}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    <span>Home</span>
                </a>
                <a href="{{ url_for('cards_page', week=routine_default_week) }}" data-nav-tab="cards" class="{% if request.endpoint in ('cards_page', 'cards_day_page') %}active{% endif %}{% if 'cards' in hidden_nav_tabs %} nav-link-hidden{% endif %}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                    <span>Cards</span>
                </a>
                <a href="{{ url_for('baby_page') }}" data-nav-tab="baby" class="{% if request.endpoint == 'baby_page' %}active{% endif %}{% if 'baby' in hidden_nav_tabs %} nav-link-hidden{% endif %}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
                    <span>Baby</span>
                </a>
                <a href="{{ url_for('budget_page') }}" data-nav-tab="budget" class="{% if request.endpoint == 'budget_page' %}active{% endif %}{% if 'budget' in hidden_nav_tabs %} nav-link-hidden{% endif %}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
                    <span>Budget</span>
                </a>
                <a href="{{ url_for('fantasy_page') }}" data-nav-tab="fantasy" class="{% if request.endpoint == 'fantasy_page' %}active{% endif %}{% if 'fantasy' in hidden_nav_tabs %} nav-link-hidden{% endif %}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="7" rx="8" ry="3"/><path d="M4 7v5c0 1.7 3.6 3 8 3s8-1.3 8-3V7"/><path d="M4 12v5c0 1.7 3.6 3 8 3s8-1.3 8-3v-5"/></svg>
                    <span>Dynasty</span>
                </a>
                <a href="{{ url_for('recipes_page') }}" data-nav-tab="recipes" class="{% if request.endpoint == 'recipes_page' %}active{% endif %}{% if 'recipes' in hidden_nav_tabs %} nav-link-hidden{% endif %}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 21h14"/><path d="M6 21V8a3 3 0 013-3h6a3 3 0 013 3v13"/><path d="M9 9h6"/><path d="M9 13h6"/><path d="M12 5V3"/></svg>
                    <span>Recipes</span>
                </a>
                <a href="{{ url_for('research_page') }}" data-nav-tab="research" class="{% if request.endpoint in ('research_page', 'research_am_facility_cost') %}active{% endif %}{% if 'research' in hidden_nav_tabs %} nav-link-hidden{% endif %}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
                    <span>Research</span>
                </a>
                <a href="{{ url_for('routines_page') }}" data-nav-tab="edit" class="{% if request.endpoint == 'routines_page' %}active{% endif %}{% if 'edit' in hidden_nav_tabs %} nav-link-hidden{% endif %}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                    <span>Edit</span>
                </a>
            </nav>
        </aside>

        <main class="main-content">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for category, message in messages %}
                    <div class="flash flash-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endwith %}
            {% block content %}{% endblock %}
        </main>

        <nav class="bottom-tabs">
            <a href="{{ url_for('dashboard') }}" data-nav-tab="home" class="{% if request.endpoint == 'dashboard' %}active{% endif %}{% if 'home' in hidden_nav_tabs %} nav-link-hidden{% endif %}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                Home
            </a>
            <a href="{{ url_for('cards_page', week=routine_default_week) }}" data-nav-tab="cards" class="{% if request.endpoint in ('cards_page', 'cards_day_page') %}active{% endif %}{% if 'cards' in hidden_nav_tabs %} nav-link-hidden{% endif %}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                Cards
            </a>
            <a href="{{ url_for('baby_page') }}" data-nav-tab="baby" class="{% if request.endpoint == 'baby_page' %}active{% endif %}{% if 'baby' in hidden_nav_tabs %} nav-link-hidden{% endif %}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
                Baby
            </a>
            <a href="{{ url_for('budget_page') }}" data-nav-tab="budget" class="{% if request.endpoint == 'budget_page' %}active{% endif %}{% if 'budget' in hidden_nav_tabs %} nav-link-hidden{% endif %}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
                Budget
            </a>
            <a href="{{ url_for('fantasy_page') }}" data-nav-tab="fantasy" class="{% if request.endpoint == 'fantasy_page' %}active{% endif %}{% if 'fantasy' in hidden_nav_tabs %} nav-link-hidden{% endif %}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="7" rx="8" ry="3"/><path d="M4 7v5c0 1.7 3.6 3 8 3s8-1.3 8-3V7"/><path d="M4 12v5c0 1.7 3.6 3 8 3s8-1.3 8-3v-5"/></svg>
                Dynasty
            </a>
            <a href="{{ url_for('recipes_page') }}" data-nav-tab="recipes" class="{% if request.endpoint == 'recipes_page' %}active{% endif %}{% if 'recipes' in hidden_nav_tabs %} nav-link-hidden{% endif %}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 21h14"/><path d="M6 21V8a3 3 0 013-3h6a3 3 0 013 3v13"/><path d="M9 9h6"/><path d="M9 13h6"/><path d="M12 5V3"/></svg>
                Recipes
            </a>
            <a href="{{ url_for('research_page') }}" data-nav-tab="research" class="{% if request.endpoint in ('research_page', 'research_am_facility_cost') %}active{% endif %}{% if 'research' in hidden_nav_tabs %} nav-link-hidden{% endif %}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
                Research
            </a>
            <a href="{{ url_for('routines_page') }}" data-nav-tab="edit" class="{% if request.endpoint == 'routines_page' %}active{% endif %}{% if 'edit' in hidden_nav_tabs %} nav-link-hidden{% endif %}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                Edit
            </a>
        </nav>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}?v={{ cache_bust }}"></script>
</body>
</html>
