{% extends "base.html" %}
{% block title %}Routines - Life Manager{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Routines</h1>
</div>

{% if cards %}
<div id="routine-fast-root"></div>
<script>
window.LM_ROUTINE_BOOT = {
  weekKey: {{ week_key|tojson }},
  selectedDate: {{ selected_date|tojson }},
  todayIso: {{ routine_today_iso|tojson }},
  cards: {{ cards|tojson }}
};
</script>
<script src="{{ url_for('static', filename='js/routine-fast-stack.js') }}?v={{ cache_bust }}"></script>
{% else %}
<div class="card" style="text-align:center; padding:2rem; color:var(--text-muted);">
    No routine cards yet. Add tasks from your routine configuration, then reload.
</div>
{% endif %}
{% endblock %}
