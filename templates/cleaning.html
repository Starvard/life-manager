{% extends "base.html" %}
{% block title %}Cleaning | Life Manager{% endblock %}

{% block content %}
<style>
.cleaning-page { max-width: 1100px; margin: 0 auto; }
.cleaning-hero {
    background: linear-gradient(135deg, #111827, #1f2937);
    color: white;
    border-radius: 22px;
    padding: 1.25rem;
    margin-bottom: 1rem;
    box-shadow: 0 14px 35px rgba(15, 23, 42, 0.16);
}
.cleaning-hero h1 { margin: 0 0 0.35rem; font-size: 1.65rem; }
.cleaning-hero p { margin: 0; color: rgba(255,255,255,.78); }
.cleaning-progress-row {
    display: flex;
    gap: .75rem;
    align-items: center;
    flex-wrap: wrap;
    margin-top: 1rem;
}
.cleaning-progress {
    flex: 1;
    min-width: 190px;
    height: 12px;
    border-radius: 999px;
    background: rgba(255,255,255,.16);
    overflow: hidden;
}
.cleaning-progress-fill {
    height: 100%;
    border-radius: inherit;
    background: white;
    transition: width .2s ease;
}
.cleaning-actions { display:flex; gap:.5rem; flex-wrap:wrap; margin-top: .9rem; }
.cleaning-btn {
    border: 1px solid rgba(255,255,255,.25);
    background: rgba(255,255,255,.12);
    color: white;
    border-radius: 999px;
    padding: .55rem .85rem;
    font-weight: 700;
    cursor: pointer;
}
.cleaning-btn.secondary {
    background: #fff;
    color: #111827;
    border-color: #fff;
}
.cleaning-room-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
    gap: .9rem;
}
.cleaning-room {
    background: white;
    border: 1px solid rgba(15, 23, 42, .08);
    border-radius: 18px;
    padding: .95rem;
    box-shadow: 0 8px 24px rgba(15, 23, 42, .07);
}
.cleaning-room-header {
    display:flex;
    justify-content:space-between;
    gap:.75rem;
    align-items:flex-start;
    margin-bottom: .65rem;
}
.cleaning-room h2 { margin:0; font-size:1.05rem; }
.cleaning-note { color:#64748b; font-size:.8rem; margin:.2rem 0 0; }
.cleaning-room-count {
    white-space: nowrap;
    color:#475569;
    background:#f1f5f9;
    border-radius:999px;
    padding:.25rem .55rem;
    font-size:.78rem;
    font-weight:800;
}
.cleaning-task {
    display:flex;
    align-items:flex-start;
    gap:.65rem;
    padding:.55rem .2rem;
    border-top:1px solid #f1f5f9;
}
.cleaning-task input {
    width: 22px;
    height: 22px;
    margin-top: .05rem;
    accent-color: #111827;
    flex: 0 0 auto;
}
.cleaning-task span {
    line-height: 1.25rem;
    color:#172033;
}
.cleaning-task.done span {
    color:#64748b;
    text-decoration: line-through;
}
.cleaning-room-reset {
    border:0;
    background:#f8fafc;
    color:#475569;
    border-radius:999px;
    padding:.45rem .7rem;
    font-weight:700;
    cursor:pointer;
    margin-top:.65rem;
}
@media (max-width: 520px) {
    .cleaning-hero { border-radius: 18px; padding: 1rem; }
    .cleaning-room-grid { grid-template-columns: 1fr; }
}
</style>

<div class="cleaning-page" x-data="cleaningChecklist({{ cleaning|tojson }})">
    <section class="cleaning-hero">
        <h1>Cleaning</h1>
        <p>Simple room-by-room reset checklist. Bedroom 3 is the former office.</p>

        <div class="cleaning-progress-row">
            <div class="cleaning-progress" aria-label="Cleaning progress">
                <div class="cleaning-progress-fill" :style="`width: ${state.percent}%`"></div>
            </div>
            <strong x-text="`${state.done}/${state.total} done`"></strong>
            <span x-text="`${state.remaining} left`"></span>
        </div>

        <div class="cleaning-actions">
            <button class="cleaning-btn secondary" type="button" @click="collapseDone = !collapseDone">
                <span x-text="collapseDone ? 'Show completed' : 'Hide completed'"></span>
            </button>
            <button class="cleaning-btn" type="button" @click="resetAll()">Reset all</button>
        </div>
    </section>

    <section class="cleaning-room-grid">
        <template x-for="room in state.rooms" :key="room.id">
            <article class="cleaning-room">
                <div class="cleaning-room-header">
                    <div>
                        <h2 x-text="room.name"></h2>
                        <p class="cleaning-note" x-show="room.note" x-text="room.note"></p>
                    </div>
                    <div class="cleaning-room-count" x-text="`${room.done}/${room.total}`"></div>
                </div>

                <template x-for="task in room.tasks" :key="task.id">
                    <label class="cleaning-task" :class="{ done: task.done }" x-show="!collapseDone || !task.done">
                        <input type="checkbox" :checked="task.done" @change="toggle(task.id, $event.target.checked)">
                        <span x-text="task.name"></span>
                    </label>
                </template>

                <button class="cleaning-room-reset" type="button" @click="clearRoom(room.id)" x-show="room.done > 0">
                    Clear this room
                </button>
            </article>
        </template>
    </section>
</div>

<script>
function cleaningChecklist(initialState) {
    return {
        state: initialState,
        collapseDone: false,

        async toggle(taskId, done) {
            const res = await fetch('/api/cleaning/toggle', {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({task_id: taskId, done})
            });
            const data = await res.json();
            if (data.ok) this.state = data;
        },

        async clearRoom(roomId) {
            const res = await fetch(`/api/cleaning/room/${roomId}/clear`, {method: 'POST'});
            const data = await res.json();
            if (data.ok) this.state = data;
        },

        async resetAll() {
            const res = await fetch('/api/cleaning/reset', {method: 'POST'});
            const data = await res.json();
            if (data.ok) this.state = data;
        }
    }
}
</script>
{% endblock %}
